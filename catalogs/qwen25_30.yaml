# ============================================================================
# Adaptive Minds — 30-adapter catalog on Qwen2.5-7B-Instruct
# ============================================================================
# This is the paper's headline-result configuration (see Table 1, row 2:
# 98.3% router accuracy on a 30-adapter library, 60 queries).
#
# All adapters live at https://huggingface.co/pavan01729/adaptive-minds-loras
# under the `qwen2.5-7b/` subfolder. vLLM serves them by name when launched
# with the `--lora-modules` args generated by:
#
#     adaptive-minds serve --catalog catalogs/qwen25_30.yaml
#
# To run a 2-adapter smoke test, disable all but two entries below (set
# `enabled: false`).
# ============================================================================

base_model:
  hf_id: Qwen/Qwen2.5-7B-Instruct
  max_lora_rank: 64

hub:
  # Adapter weights repo; combined with each entry's `hf_subdir` to form the
  # vLLM `--lora-modules name=<hub.repo>/<hf_subdir>` path.
  repo: pavan01729/adaptive-minds-loras

router:
  prompt_template: |
    Analyze the user query below and select the single best domain expert
    from the list. Respond with ONLY the expert's id (lowercase, no
    punctuation).

    Query: "{query}"

    Experts:
    {domain_list}

    Selected expert:
  temperature: 0.0
  max_tokens: 16

agent:
  brain: base
  max_steps: 6
  max_tokens: 2048

lora_adapters:
  # --- Paper Table 2 specialists (9 benchmarks) -----------------------------
  - name: SQL
    hf_subdir: qwen2.5-7b/qwen25_sql_v1
    description: Translate natural-language questions into SQL queries (Spider domain).
    system_prompt: You write correct, executable SQL. Use the schema provided.
    keywords: [sql, query, select, join, where, group by, spider, schema]
    enabled: true

  - name: Cypher
    hf_subdir: qwen2.5-7b/qwen25_cypher_v1
    description: Translate natural language into Cypher graph queries (Neo4j).
    system_prompt: You write correct Cypher patterns for Neo4j graph queries.
    keywords: [cypher, neo4j, graph, match, relationship, node, path]
    enabled: true

  - name: Bash
    hf_subdir: qwen2.5-7b/qwen25_bash_v1
    description: Translate natural-language requests into bash one-liners (nl2bash).
    system_prompt: You write concise, correct bash one-liners. Prefer POSIX-portable forms.
    keywords: [bash, shell, command, pipe, grep, awk, sed, find, one-liner]
    enabled: true

  - name: SPARQL
    hf_subdir: qwen2.5-7b/qwen25_sparql_v1
    description: Translate natural-language questions into SPARQL queries (LC-QuAD).
    system_prompt: You write correct SPARQL queries against linked-data endpoints.
    keywords: [sparql, rdf, linked data, dbpedia, wikidata, prefix, select where]
    enabled: true

  - name: Mermaid
    hf_subdir: qwen2.5-7b/qwen25_mermaid_v1
    description: Generate Mermaid sequence/flow/class diagrams from natural-language specs.
    system_prompt: You output valid Mermaid diagram source. No prose outside the code block.
    keywords: [mermaid, sequence diagram, flowchart, class diagram, sequenceDiagram]
    enabled: true

  - name: PII
    hf_subdir: qwen2.5-7b/qwen25_pii_v1
    description: Detect and redact personally identifiable information from text.
    system_prompt: You identify PII spans and emit redacted text with [LABEL] placeholders.
    keywords: [pii, redact, anonymize, mask, ssn, email, phone, personal information]
    enabled: true

  - name: Quantum
    hf_subdir: qwen2.5-7b/qwen25_quantum_v1_grpo
    description: Write Qiskit code for quantum-computing tasks (HumanEval-quantum, GRPO-trained).
    system_prompt: You write correct Qiskit programs. Import what you use; prefer Aer.
    keywords: [qiskit, quantum, qubit, circuit, gate, measurement, superposition]
    enabled: true

  - name: Legal
    hf_subdir: qwen2.5-7b/qwen25_legal_v1_grpo
    description: Classify legal provisions into LEDGAR labels (3-stage curriculum).
    system_prompt: You classify legal provisions into the LEDGAR taxonomy with the integer label only.
    keywords: [legal, contract, ledgar, provision, clause, warranty, indemnity]
    enabled: true

  - name: Chemistry
    hf_subdir: qwen2.5-7b/qwen25_chem_v1_grpo
    description: Optimize molecules toward QED on ChEMBL canonical SMILES (GRPO-trained).
    system_prompt: You output a single canonical SMILES string. No prose.
    keywords: [smiles, molecule, chemistry, chembl, qed, optimization, reaction]
    enabled: true

  # --- Routing-library additions (single-domain specialists) ----------------
  - name: Reasoning
    hf_subdir: qwen2.5-7b/qwen25_reasoning_v1
    description: General multi-step reasoning trace (MATH-500 / GSM8K style).
    system_prompt: You think step-by-step before giving the final answer.
    keywords: [reason, think, step by step, math problem, logic, deduction]
    enabled: true

  - name: Astrophysics
    hf_subdir: qwen2.5-7b/qwen25_astrophysics_v1
    description: Astrophysics expert — stellar physics, cosmology, observational astronomy.
    system_prompt: You are an astrophysics expert. Give precise, equation-grounded answers.
    keywords: [astrophysics, stellar, galaxy, cosmology, nebula, redshift, telescope]
    enabled: true

  - name: Biology
    hf_subdir: qwen2.5-7b/qwen25_biology_v1
    description: Biology expert — cell biology, genetics, evolution, physiology.
    system_prompt: You are a biology expert. Provide accurate, mechanism-level explanations.
    keywords: [biology, cell, gene, dna, protein, evolution, organism, enzyme]
    enabled: true

  - name: CaseLaw
    hf_subdir: qwen2.5-7b/qwen25_case_law_v1
    description: Case-law expert — common-law reasoning, holdings, IRAC analysis.
    system_prompt: You analyze case law using IRAC structure (Issue, Rule, Application, Conclusion).
    keywords: [case law, court, ruling, precedent, holding, irac, opinion]
    enabled: true

  - name: CTI
    hf_subdir: qwen2.5-7b/qwen25_cti_v1_grpo
    description: Cyber threat intelligence — IOC extraction, TTP mapping, MITRE ATT&CK.
    system_prompt: You extract structured CTI artifacts from incident reports.
    keywords: [cti, threat, malware, ioc, mitre, attck, ttp, security, incident]
    enabled: true

  - name: Economics
    hf_subdir: qwen2.5-7b/qwen25_economics_v1
    description: Economics expert — micro/macro theory, policy analysis, markets.
    system_prompt: You are an economics expert. Reason from first principles where possible.
    keywords: [economics, market, supply, demand, gdp, inflation, monetary, fiscal]
    enabled: true

  - name: Finance
    hf_subdir: qwen2.5-7b/qwen25_finance_v1
    description: Finance expert — investing, valuation, accounting, banking.
    system_prompt: You are a finance expert. Give concrete, numerate answers.
    keywords: [finance, stock, bond, investment, valuation, accounting, banking, portfolio]
    enabled: true

  - name: FunctionCall
    hf_subdir: qwen2.5-7b/qwen25_funccall_v1
    description: OpenAI-style structured tool/function calls (JSON arguments).
    system_prompt: You emit JSON function calls in OpenAI tool-call format.
    keywords: [function call, tool call, api, json, invoke, function_call]
    enabled: true

  - name: History
    hf_subdir: qwen2.5-7b/qwen25_history_v1
    description: History expert — events, periods, historiography, primary sources.
    system_prompt: You are a history expert. Cite dates, places, and causal chains precisely.
    keywords: [history, century, war, empire, ancient, medieval, revolution, dynasty]
    enabled: true

  - name: Marketing
    hf_subdir: qwen2.5-7b/qwen25_marketing_v1
    description: Marketing expert — copy, positioning, campaign analysis, channels.
    system_prompt: You are a marketing expert. Give actionable, audience-aware advice.
    keywords: [marketing, brand, campaign, copy, audience, conversion, funnel, ad]
    enabled: true

  - name: Medicine
    hf_subdir: qwen2.5-7b/qwen25_medicine_v1
    description: Medicine expert — clinical reasoning, anatomy, pharmacology.
    system_prompt: You are a medical knowledge expert. Always recommend professional consultation.
    keywords: [medicine, clinical, patient, symptom, diagnosis, treatment, drug, anatomy]
    enabled: true

  - name: MusicTheory
    hf_subdir: qwen2.5-7b/qwen25_music_theory_v1
    description: Music theory — harmony, voice leading, counterpoint, analysis.
    system_prompt: You are a music theory expert. Reference scale-degree and Roman-numeral analysis precisely.
    keywords: [music, harmony, chord, scale, counterpoint, key signature, modulation]
    enabled: true

  - name: Philosophy
    hf_subdir: qwen2.5-7b/qwen25_philosophy_v1
    description: Philosophy expert — ethics, epistemology, metaphysics, logic.
    system_prompt: You are a philosophy expert. Reconstruct arguments carefully and identify assumptions.
    keywords: [philosophy, ethics, epistemology, metaphysics, kant, hume, argument]
    enabled: true

  - name: Psychology
    hf_subdir: qwen2.5-7b/qwen25_psychology_v1
    description: Psychology expert — cognitive, clinical, social, developmental.
    system_prompt: You are a psychology expert. Cite mechanisms and major findings precisely.
    keywords: [psychology, cognitive, behavior, perception, memory, freud, clinical]
    enabled: true

  - name: Regex
    hf_subdir: qwen2.5-7b/qwen25_regex_v1
    description: Generate correct regular expressions from natural-language descriptions.
    system_prompt: You output a single regex pattern. No prose unless asked.
    keywords: [regex, pattern, regular expression, match, grep, capture group]
    enabled: true

  - name: Sociology
    hf_subdir: qwen2.5-7b/qwen25_sociology_v1
    description: Sociology expert — social structures, theory, methodology.
    system_prompt: You are a sociology expert. Reference major theorists and empirical findings.
    keywords: [sociology, society, social, durkheim, weber, marx, ethnography]
    enabled: true

  - name: Theorem
    hf_subdir: qwen2.5-7b/qwen25_theorem_v1_grpo
    description: Theorem proving — Lean / Coq-style structured proofs (GRPO-trained).
    system_prompt: You output formal proof scripts. State each tactic clearly.
    keywords: [theorem, proof, lean, coq, tactic, lemma, qed, induction]
    enabled: true

  - name: Verilog
    hf_subdir: qwen2.5-7b/qwen25_verilog_v1
    description: Verilog / SystemVerilog hardware design — modules, sequential and combinational logic.
    system_prompt: You write correct synthesizable Verilog. Always declare reg/wire types.
    keywords: [verilog, systemverilog, module, always, hdl, hardware, counter, register]
    enabled: true

  - name: DataframeDS
    hf_subdir: qwen2.5-7b/qwen25_dataframe_ds_v23_sft
    description: Pandas / data-science operations — transformations, joins, aggregations.
    system_prompt: You write correct pandas / polars code. Prefer vectorised operations.
    keywords: [pandas, dataframe, groupby, merge, csv, polars, dataframe operations]
    enabled: true

  - name: JSONSchema
    hf_subdir: qwen2.5-7b/qwen25_json_schema_v23_sft
    description: Generate JSON Schema definitions from natural-language data descriptions.
    system_prompt: You emit valid JSON Schema (draft 2020-12). Output JSON only.
    keywords: [json schema, validation, properties, required, draft, openapi schema]
    enabled: true

  - name: OpenAPI
    hf_subdir: qwen2.5-7b/qwen25_openapi_v23_sft
    description: Generate OpenAPI 3.x specifications from natural-language endpoint descriptions.
    system_prompt: You emit valid OpenAPI 3.0 YAML. Output YAML only.
    keywords: [openapi, swagger, rest api, endpoint, path, schema, get, post]
    enabled: true
